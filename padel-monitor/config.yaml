profile:
  min_area_m2: 180          # 1 корт: 20x10 + конструкция ~231 м²; берём с запасом вниз
  two_courts_area_m2: 450   # бонус: влезают 2 корта
  area_ideal_min_m2: 230    # оптимальная полоса под клуб на 1-2 корта
  area_ideal_max_m2: 1200
  huge_area_m2: 2000        # больше и неделимо — штраф (не под 1-2 корта)
  min_height_m: 5.0         # высота указана и ниже — отказ
  good_height_m: 6.0
  great_height_m: 8.0
  # локация: Минск и прям рядом (удобно добираться)
  center_lat: 53.9023          # центр Минска
  center_lon: 27.5619
  max_distance_km: 20          # дальше от центра — отказ
  near_distance_km: 8          # ближе — бонус (город)
  ok_distance_km: 13           # до ~МКАД — норма; 13-20 км — штраф «далековато»
  # текстовый fallback, если у объявления нет координат:
  # town содержит «минск» ИЛИ район «минский» (не область!)
  regions: ["минск", "минский"]
  # жёсткие исключения по тексту (подтверждены)
  exclude_keywords: ["подвал", "цокол", "коворкинг", "кабинет"]
  top_n: 15                 # сколько вариантов в еженедельном отчёте
  alert_min_score: 80       # pre_score, с которого шлём мгновенный алерт-эталон

sources:
  realt:
    enabled: true
    pages: 2                # страниц на категорию за прогон (sortType=createdAt)
    delay_s: 3
    categories:             # slug каталога realt.by/rent/<slug>/
      - warehouses
      - storages
      - production
      - services
      - shops
  kufar:
    enabled: true
    delay_s: 3
    urls:                   # только SSR первой страницы, без query-параметров
      - https://re.kufar.by/l/minsk/snyat/kommercheskaya
      - https://re.kufar.by/l/minsk/snyat/kommercheskaya/sklady
      - https://re.kufar.by/l/minsk/snyat/kommercheskaya/promyshlennye
      - https://re.kufar.by/l/minsk/snyat/kommercheskaya/magaziny
  megapolis:
    enabled: false          # сайт недоступен не с BY IP; включить и проверить с VPS
    delay_s: 3
    urls:
      - https://megapolis-real.by/realt/skladskaya-nedvizhimost/arenda/
      - https://megapolis-real.by/realt/torgovaya-nedvizhimost/arenda/

telegram:
  chat_id: 337541656

# LLM-скоринг/vision/судья живут в Pi-агенте (.pi/skills/padel-weekly-report),
# модель выбирается в Pi через /model. Здесь только параметры выдачи данных.
report:
  prev_leaders: 5                     # сколько прошлых лидеров отдавать судье
  alert_max_per_day: 3                # максимум мгновенных алертов-эталонов в сутки
  alert_price_drop_pct: 7             # порог снижения цены для алерта, %
  enrich_top_n: 20                    # сколько кандидатов обогащать detail-страницами
  enrich_delay_s: 4                   # задержка между detail-запросами
  vision_max_images_enriched: 8       # фото на обогащённого кандидата для судьи

# Юнит-экономика клуба — допущения для оценки цены судьёй (правь по мере
# изучения рынка). Судья считает: корты = кусок / 300; выручка = корты *
# hours * 30 * utilization * price; доля аренды = аренда / выручка.
economics:
  court_hours_per_day: 14             # игровое окно клуба
  utilization: 0.45                   # средняя загрузка корта
  price_per_hour_byn: 60              # ставка аренды корта в час
  rent_share_warn: 0.25               # аренда > этой доли выручки — тревога

db_path: data/monitor.db
raw_dir: data/raw
